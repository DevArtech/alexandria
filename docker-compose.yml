services:
  alexandria-mcp:
    build: .
    restart: unless-stopped
    environment:
      # Bearer token clients must present. Set in .env (see .env.example).
      ALEXANDRIA_MCP_TOKEN: ${ALEXANDRIA_MCP_TOKEN:?set ALEXANDRIA_MCP_TOKEN in .env}
      # Only needed if the library's embedder calls a remote/keyed endpoint.
      # For a keyless local endpoint (Ollama/LocalAI/TEI) this can be omitted.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # An initialized Alexandria library. Create with:
      #   alexandria init ./library
      - ./library:/srv/alexandria
    # Not published to the host: only the OAuth proxy can reach it, over the
    # internal compose network. It still enforces ALEXANDRIA_MCP_TOKEN.
    expose:
      - "8080"
    # Reaches the network for a local embedding endpoint, if you run one.
    # If you run Ollama on the host, set base_url to
    # http://host.docker.internal:11434/v1 in the library config and add:
    # extra_hosts: ["host.docker.internal:host-gateway"]

  # Thin reverse proxy: self-hosted OAuth (DCR + PKCE) or legacy bearer, then
  # injects ALEXANDRIA_MCP_TOKEN toward alexandria-mcp. Only service on the host.
  alexandria-oauth-proxy:
    build: ./proxy
    restart: unless-stopped
    depends_on:
      - alexandria-mcp
    environment:
      OAUTH_MODE: ${OAUTH_MODE:-self}
      UPSTREAM_URL: http://alexandria-mcp:8080
      ALEXANDRIA_MCP_TOKEN: ${ALEXANDRIA_MCP_TOKEN:?set ALEXANDRIA_MCP_TOKEN in .env}
      RESOURCE_URL: ${RESOURCE_URL:?set RESOURCE_URL in .env}
      OAUTH_ISSUER: ${OAUTH_ISSUER:-}
      OAUTH_AUDIENCE: ${OAUTH_AUDIENCE:-}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-}
      OAUTH_REQUIRED_SCOPES: ${OAUTH_REQUIRED_SCOPES:-}
      LOGIN_USERNAME: ${LOGIN_USERNAME:-admin}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:?set LOGIN_PASSWORD in .env}
      DATA_DIR: /data
      ALLOW_LEGACY_STATIC_TOKEN: ${ALLOW_LEGACY_STATIC_TOKEN:-false}
      LEGACY_BEARER_TOKEN: ${LEGACY_BEARER_TOKEN:-}
      PORT: "8081"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - oauth_proxy_data:/data
    ports:
      - "127.0.0.1:8081:8081"

  # Optional: a local OpenAI-compatible embedding endpoint.
  # Uncomment, then set the library's [providers] embedder = "openai" with
  # base_url = "http://ollama:11434/v1" and embed_model = "nomic-embed-text".
  # ollama:
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   expose:
  #     - "11434"

volumes:
  oauth_proxy_data:
  # ollama_models:
